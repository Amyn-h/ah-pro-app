name: Build APK

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
        pip install --upgrade pip
        pip install buildozer cython kivy

    - name: Create buildozer.spec
      run: |
        echo '[app]' > buildozer.spec
        echo 'title = A.H Pro' >> buildozer.spec
        echo 'package.name = ahpro' >> buildozer.spec
        echo 'package.domain = com.ahpro' >> buildozer.spec
        echo 'source.dir = .' >> buildozer.spec
        echo 'source.include_exts = py,png,jpg,kv,atlas' >> buildozer.spec
        echo 'version = 1.0.0' >> buildozer.spec
        echo 'requirements = python3,kivy,requests' >> buildozer.spec
        echo 'orientation = portrait' >> buildozer.spec
        echo 'android.permissions = INTERNET' >> buildozer.spec
        echo 'android.api = 31' >> buildozer.spec
        echo 'android.minapi = 21' >> buildozer.spec
        echo 'fullscreen = 0' >> buildozer.spec
        cat buildozer.spec

    - name: Build APK
      run: |
        buildozer android debug deploy run

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: AH-Pro-APK
        path: bin/*.apk
